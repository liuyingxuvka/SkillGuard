interface:
  display_name: "FlowGuard Behavior Commitment Ledger"
  short_description: "Register behavior, owners, evidence, and path authority"
  default_prompt: "Use $flowguard-behavior-commitment-ledger for route_id=behavior_commitment_ledger, role=public_owner, native_owner=behavior_commitment_ledger; query the canonical ledger lightly, classify each production row as product_runtime, agent_operation, or development_process plus actor_kind, require bidirectional source coverage, one active commitment and primary model owner per exact same-plane intent, typed reasoned cross-plane relations, no delegate commitments for equivalent surfaces, and one singular current-green primary_path_id for path-sensitive rows; related-plane rows are context, never merged instructions; legacy unclassified/dependency inputs are migration-only; do not replace PPA, MTA, TestMesh, or Risk Ledger; output evidence, failures, blockers, skipped_checks, residual_risk, claim_boundary, and typed_next_actions; broad claims remain blocked by any ledger or PPA gap. When creating or materially changing a concrete model instance, first freeze task/instance-specific one-or-many protected failures and the claim boundary, then bind the exact candidate plus native good, per-failure bad, oracle, and current evidence; reusable model types are not permanently single-purpose; FlowGuard owns semantics and SkillGuard only supervises declared checks."
