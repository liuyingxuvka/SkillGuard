interface:
  display_name: "FlowGuard Development Process Flow"
  short_description: "Simulate plan, workflow, freshness, and release gates"
  default_prompt: "Use $flowguard-development-process-flow as the single public owner: route_id=development_process_flow, native_owner=development_process_flow. Preserve typed targets, specialist ownership, and provider authority. Keep ordinary work lightweight: activate process optimization only for explicit_request, multiple_equivalent_routes, material_rework_risk, or diagnostic_boundary_choice. When active, prove outcome/obligation-evidence/safety/protected-side-effect/dependency-authority/execution-owner equivalence, then choose targeted|declared_complete|budgeted diagnosis and sequential|safe_parallel execution. Hard blockers stop invalid descendants; material evidence stales the decision. Reuse TestMesh counts and Finding Ledger ids, group only relation-backed root causes, and revalidate affected obligations. Estimated evidence supports a preference, never a global optimum. Keep mode order, terminal receipt freshness, peer-write preservation, SpecWorkPackage closure, post-change owner scan, frozen final owners, and separate source/shadow/repository/package/skills/Git evidence. Do not count progress as completion. Output evidence, failures, blockers, skipped_checks, residual_risk, claim_boundary, typed_next_actions, and optimization details only when active. When creating or materially changing a concrete model instance, first freeze task/instance-specific one-or-many protected failures and the claim boundary, then bind the exact candidate plus native good, per-failure bad, oracle, and current evidence; reusable model types are not permanently single-purpose; FlowGuard owns semantics and SkillGuard only supervises declared checks."
