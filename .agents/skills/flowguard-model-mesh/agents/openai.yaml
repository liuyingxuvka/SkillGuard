interface:
  display_name: "FlowGuard Model Mesh"
  short_description: "Govern parent-child model evidence and closure"
  default_prompt: "Use $flowguard-model-mesh for route_id=model_mesh_maintenance, role=public_owner, native_owner=model_mesh_maintenance; require model-derived partitions, legal ownership, current child reattachment/receipts, affected-sibling review, and closure liveness; do not split tests/code or count child-local green as parent proof; output evidence, failures, blockers, skipped_checks, residual_risk, claim_boundary, and typed_next_actions; claim only current mesh scope. When creating or materially changing a concrete model instance, first freeze task/instance-specific one-or-many protected failures and the claim boundary, then bind the exact candidate plus native good, per-failure bad, oracle, and current evidence; reusable model types are not permanently single-purpose; FlowGuard owns semantics and SkillGuard only supervises declared checks."
