interface:
  display_name: "FlowGuard Agent Workflow Rehearsal"
  short_description: "Rehearse delegated skill and tool workflows"
  default_prompt: "Use $flowguard-agent-workflow-rehearsal only when explicitly requested or delegated: route_id=agent_workflow_rehearsal, role=delegated_mode, native_owner=development_process_flow; for non-trivial operations lightly recall registered agent_operation commitments, keep each AI step in agent_operation, and reference sibling-plane targets only by commitment id plus typed relation; require a fresh inventory, accepted skips, prior side-effect gates, receipts, continue/rework paths, and final evidence boundaries; do not force trivial actions through a model, copy product behavior into AI steps, execute tools, or replace native validation; output evidence, failures, blockers, skipped_checks, residual_risk, claim_boundary, and typed_next_actions; claim only rehearsal readiness, never workflow completion. When creating or materially changing a concrete model instance, first freeze task/instance-specific one-or-many protected failures and the claim boundary, then bind the exact candidate plus native good, per-failure bad, oracle, and current evidence; reusable model types are not permanently single-purpose; FlowGuard owns semantics and SkillGuard only supervises declared checks."
