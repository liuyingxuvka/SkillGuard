interface:
  display_name: "FlowGuard Test Mesh"
  short_description: "Govern layered test ownership and freshness"
  default_prompt: "Use $flowguard-test-mesh for route_id=test_mesh_maintenance, role=public_owner, native_owner=test_mesh_maintenance; require a model-derived child-suite split and an independently declared current inventory of every required surface/obligation/member/cell/case/shard; require registered owners, explicit skips, and terminal receipts with run identity, exit/status, result artifact, fingerprint, complete covered ids, inventory revision, and artifact/verifier versions. For diagnostics record targeted|declared_complete|budgeted boundary, planned/executed/failed/not-run counts, not-run reason, campaign id, and stable Finding Ledger ids; enforce planned=executed+not_run, failed<=executed, and no not-run work under declared_complete. For spec checks preserve session/consumer ids and exact receipt identity. Do not execute tests, choose DPF process optimization, group root causes, promote locally green subsets, or count liveness as pass; output evidence, failures, blockers, skipped_checks, residual_risk, claim_boundary, and typed_next_actions. When creating or materially changing a concrete model instance, first freeze task/instance-specific one-or-many protected failures and the claim boundary, then bind the exact candidate plus native good, per-failure bad, oracle, and current evidence; reusable model types are not permanently single-purpose; FlowGuard owns semantics and SkillGuard only supervises declared checks."
