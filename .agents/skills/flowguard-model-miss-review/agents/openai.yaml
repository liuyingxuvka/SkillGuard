interface:
  display_name: "FlowGuard Model Miss Review"
  short_description: "Generalize and close post-green failure classes"
  default_prompt: "Use $flowguard-model-miss-review for route_id=model_miss_review, role=public_owner, native_owner=model_miss_review; require concrete failure evidence, affected behavior plane, commitment/primary owner, evidence-bound error signature, and typed related-plane context; search the affected plane first, reuse an existing commitment when present, and choose coverage_gap_backfill only when no same-plane promise exists; require miss classification, root-cause backpropagation, canonical same-class cases, and owner-code tests; do not merge same symptoms across planes or close with a point patch/later green command; output evidence, failures, blockers, skipped_checks, residual_risk, claim_boundary, and typed_next_actions; claim only current plane-local bug-class closure. When creating or materially changing a concrete model instance, first freeze task/instance-specific one-or-many protected failures and the claim boundary, then bind the exact candidate plus native good, per-failure bad, oracle, and current evidence; reusable model types are not permanently single-purpose; FlowGuard owns semantics and SkillGuard only supervises declared checks."
