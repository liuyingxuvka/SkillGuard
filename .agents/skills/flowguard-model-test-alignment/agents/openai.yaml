interface:
  display_name: "FlowGuard Model-Test Alignment"
  short_description: "Bind obligations, owner code, and current tests"
  default_prompt: "Use $flowguard-model-test-alignment for route_id=model_test_alignment, role=public_owner, native_owner=model_test_alignment; require each obligation to bind one stable intent/commitment/selected path, an owner external CodeContract, and current same-behavior evidence; materialize every in-scope similarity relation/test/code id; accept family evidence only for the same actual member obligations; retain facades only as currently proved delegates with no independent success; block same-intent path drift and parallel ownership; use typed TestMesh handoff for large/slow evidence; do not own test/code/model partitioning or conformance replay; output evidence, failures, blockers, skipped_checks, residual_risk, claim_boundary, and typed_next_actions; claim only row-level alignment coverage. When creating or materially changing a concrete model instance, first freeze task/instance-specific one-or-many protected failures and the claim boundary, then bind the exact candidate plus native good, per-failure bad, oracle, and current evidence; reusable model types are not permanently single-purpose; FlowGuard owns semantics and SkillGuard only supervises declared checks."
