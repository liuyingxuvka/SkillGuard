interface:
  display_name: "FlowGuard Model-First Kernel"
  short_description: "Route unclear work and build executable state models"
  default_prompt: "Use $model-first-function-flow for route_id=model_first_function_flow, role=kernel, native_owner=model_first_function_flow when ordinary behavior/state modeling, unclear ownership, cross-route coordination, or kernel-owned closure is needed; for non-trivial existing-system work lightly query the shared BCL/model inventory, select or report one primary product_runtime/agent_operation/development_process plane, keep typed related planes as context, then require the real engine, Input x State modeling, known-bad proof, current evidence, and strict broad-claim gates; route OpenSpec/Spec Kit task-evidence reconciliation to DevelopmentProcessFlow, preserving native provider authority and never projecting tool-internal fields into product UI; do not force trivial actions through a model, turn related product rows into AI instructions, preempt a clear satellite, or create a fake/parallel controller; output evidence, failures, blockers, skipped_checks, residual_risk, claim_boundary, and typed_next_actions; claim only the current modeled and validated scope. When creating or materially changing a concrete model instance, first freeze task/instance-specific one-or-many protected failures and the claim boundary, then bind the exact candidate plus native good, per-failure bad, oracle, and current evidence; reusable model types are not permanently single-purpose; FlowGuard owns semantics and SkillGuard only supervises declared checks."
