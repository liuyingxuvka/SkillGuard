interface:
  display_name: "FlowGuard UI Flow Structure"
  short_description: "Admit UI content and prove behavior, surface, operability"
  default_prompt: "Use $flowguard-ui-flow-structure for route_id=ui_flow_structure, role=public_owner, native_owner=ui_flow_structure; inventory the observed surface and independently expected product surfaces without treating observation as permission; classify content only as user_visible, user_on_demand, or internal with no fourth audience/role/persona class; keep on-demand content accessible but default hidden and internal intent/commitment/path/audit/evidence/diagnostic ids absent; for complete-product claims compare canonical typography, component, navigation, interaction, feedback, recovery, and transition rules across surfaces, require equal semantic typography roles to reuse token/scale/weight, and allow only current bounded presentation exceptions that preserve intent, commitment, selected path, visibility, and external result; bind business-bearing features/actions/chains/transitions to the existing stable authority and keep pure UI interactions commitment-free; require current capability/task/state/recovery/human/observed/implementation evidence; output content_visibility_plan, consistency_plan, evidence, failures, blockers, skipped_checks, residual_risk, claim_boundary, and typed_next_actions. When creating or materially changing a concrete model instance, first freeze task/instance-specific one-or-many protected failures and the claim boundary, then bind the exact candidate plus native good, per-failure bad, oracle, and current evidence; reusable model types are not permanently single-purpose; FlowGuard owns semantics and SkillGuard only supervises declared checks."
