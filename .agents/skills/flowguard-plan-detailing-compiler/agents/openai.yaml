interface:
  display_name: "FlowGuard Plan Detailing Compiler"
  short_description: "Compile delegated rough plans into checkable rows"
  default_prompt: "Use $flowguard-plan-detailing-compiler only when explicitly requested or delegated: route_id=plan_detailing_compiler, role=delegated_mode, native_owner=development_process_flow; require structured sources, scope, artifacts, state, agent_operation steps, separate target commitment/plane/typed-relation refs, receipts, validation, failures, continue/rework, UI/payload gates, and final evidence. When DPF process optimization is active, keep only plan-level process_optimization_reasons and one current required_process_optimization_evidence_ids reference; never copy optimizer state into every step or validation. For specification providers preserve separate provider/work-package/change/task/obligation/check/binding ids and bidirectional owner mappings. Project AI ownership to AgentWorkflow and lifecycle ownership to DPF without absorbing provider or product authority; do not execute work or replace downstream proof; output evidence, failures, blockers, skipped_checks, residual_risk, claim_boundary, and typed_next_actions. When creating or materially changing a concrete model instance, first freeze task/instance-specific one-or-many protected failures and the claim boundary, then bind the exact candidate plus native good, per-failure bad, oracle, and current evidence; reusable model types are not permanently single-purpose; FlowGuard owns semantics and SkillGuard only supervises declared checks."
