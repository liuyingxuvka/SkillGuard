interface:
  display_name: "FlowGuard Structure Mesh"
  short_description: "Govern model-derived code refactor structure"
  default_prompt: "Use $flowguard-structure-mesh for route_id=structure_mesh_maintenance, role=public_owner, native_owner=structure_mesh_maintenance; require model-derived target structure, single ownership, public facades, safe dependencies/config, and current parity; do not invent behavior, plan greenfield code, or refactor directly; output evidence, failures, blockers, skipped_checks, residual_risk, claim_boundary, and typed_next_actions; claim only current routine or release structure scope. When creating or materially changing a concrete model instance, first freeze task/instance-specific one-or-many protected failures and the claim boundary, then bind the exact candidate plus native good, per-failure bad, oracle, and current evidence; reusable model types are not permanently single-purpose; FlowGuard owns semantics and SkillGuard only supervises declared checks."
