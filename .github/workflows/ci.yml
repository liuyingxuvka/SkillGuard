name: SkillGuard CI

on:
  push:
  pull_request:
  workflow_dispatch:

permissions:
  contents: read

jobs:
  v2-focused:
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, windows-latest]
        python-version: ["3.11", "3.12"]
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v7
      - uses: actions/setup-python@v6
        with:
          python-version: ${{ matrix.python-version }}
      - run: python -m pip install --upgrade pip
      - run: python -m pip install pytest "git+https://github.com/liuyingxuvka/FlowGuard.git@v0.56.0"
      - run: python -m pytest tests/test_contract_compiler_v2.py tests/test_installation.py -q

  clean-installed-layout:
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, windows-latest]
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v7
      - uses: actions/setup-python@v6
        with:
          python-version: "3.12"
      - run: python -m pip install --upgrade pip
      - run: python -m pip install pytest "git+https://github.com/liuyingxuvka/FlowGuard.git@v0.56.0"
      - run: python .agents/skills/skillguard/scripts/skillguard_install.py --canonical-skill-root .agents/skills/skillguard --stage-root .install-smoke/.codex/skills/skillguard --prepare

  full-current-suite:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v7
      - uses: actions/setup-python@v6
        with:
          python-version: "3.12"
      - run: python -m pip install --upgrade pip
      - run: python -m pip install pytest "git+https://github.com/liuyingxuvka/FlowGuard.git@v0.56.0"
      - run: python -m pytest -q
